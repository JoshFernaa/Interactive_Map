<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .dark-mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 9999;
        }

        #map {
            width: 100%;
            height: 80vh;
        }

        .form-container {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .dark-mode .form-container {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle">Toggle Dark Mode</button>

    <div class="container-fluid py-3">
        <div class="row">
            <div class="col-12">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);

        const lightModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        }).addTo(map);

        const darkModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        });

        let currentTileLayer = lightModeTiles;
        currentTileLayer.addTo(map);

        const markerLayer = L.layerGroup().addTo(map);
        const customMarkers = new Map();

        document.getElementById('dark-mode-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const darkModeEnabled = document.body.classList.contains('dark-mode');

            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeEnabled ? darkModeTiles : lightModeTiles;
            currentTileLayer.addTo(map);
        });

        map.on('click', async function(e) {
            const { lat, lng } = e.latlng;
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const data = await response.json();
            const address = data.display_name || "Custom Location";
            
            const marker = L.marker([lat, lng]).addTo(map);
            customMarkers.set(marker._leaflet_id, marker);

            marker.bindPopup(getPopupContent(marker._leaflet_id, address)).openPopup();
        });

        function getPopupContent(markerId, address) {
            return `
                <div>
                    <input type="text" id="marker-name-${markerId}" value="${address}" style="width: 100%; margin-bottom: 5px;">
                    <button onclick="saveMarker(${markerId})" class="btn btn-primary btn-sm">Save</button>
                    <button onclick="deleteMarker(${markerId})" class="btn btn-danger btn-sm">Delete</button>
                </div>
            `;
        }

        function saveMarker(markerId) {
            const input = document.getElementById(`marker-name-${markerId}`);
            if (!input) return;
            const newName = input.value;
            
            const marker = customMarkers.get(markerId);
            if (marker) {
                marker.bindPopup(`<b>${newName}</b>`);
                marker.closePopup();
            }
        }

        function deleteMarker(markerId) {
            const marker = customMarkers.get(markerId);
            if (marker) {
                map.removeLayer(marker);
                customMarkers.delete(markerId);
            }
        }
    </script>
</body>
</html>
