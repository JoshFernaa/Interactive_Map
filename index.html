<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        /* Dark mode toggle button */
        .dark-mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 9999;
        }

        #map {
            width: 100%;
            height: 80vh;
        }

        /* User input form styling */
        .form-container {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .dark-mode .form-container {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle">Toggle Dark Mode</button>

    <div class="container-fluid py-3">
        <div class="row">
            <div class="col-12">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);

        // Light mode tiles (English labels enforced)
        const lightModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Dark mode tiles
        const darkModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        });

        let currentTileLayer = lightModeTiles;
        currentTileLayer.addTo(map);

        const markerLayer = L.layerGroup().addTo(map);

        // Allow users to click on the map to add a marker
        map.on('click', function(event) {
            let lat = event.latlng.lat;
            let lng = event.latlng.lng;
            let newMarker = L.marker([lat, lng]).addTo(markerLayer);

            let popupContent = document.createElement("div");
            let inputField = document.createElement("input");
            inputField.type = "text";
            inputField.placeholder = "Enter marker name";
            popupContent.appendChild(inputField);

            let saveButton = document.createElement("button");
            saveButton.innerText = "Save";
            saveButton.onclick = function() {
                let markerName = inputField.value.trim();
                if (markerName) {
                    newMarker.bindPopup(`<b>${markerName}</b>`).openPopup();
                }
            };
            popupContent.appendChild(saveButton);

            let deleteButton = document.createElement("button");
            deleteButton.innerText = "Delete";
            deleteButton.onclick = function() {
                map.removeLayer(newMarker);
            };
            popupContent.appendChild(deleteButton);

            newMarker.bindPopup(popupContent).openPopup();
        });
    </script>
</body>
</html>
