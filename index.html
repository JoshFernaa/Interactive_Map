<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="interactive-map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .dark-mode-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 1000;
        }

        #map {
            width: 100%;
            height: 80vh;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle">Toggle Dark Mode</button>
    <div class="container-fluid py-5">
        <div class="row">
            <div class="col-12">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);

        const lightModeTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        });

        const darkModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        });

        let currentTileLayer = lightModeTiles;
        currentTileLayer.addTo(map);

        document.getElementById('dark-mode-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const darkModeEnabled = document.body.classList.contains('dark-mode');

            if (darkModeEnabled) {
                map.removeLayer(currentTileLayer);
                currentTileLayer = darkModeTiles;
                darkModeTiles.addTo(map);
            } else {
                map.removeLayer(currentTileLayer);
                currentTileLayer = lightModeTiles;
                lightModeTiles.addTo(map);
            }

            localStorage.setItem('darkMode', darkModeEnabled);
        });

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeTiles;
            darkModeTiles.addTo(map);
        }
    </script>
</body>
</html>
