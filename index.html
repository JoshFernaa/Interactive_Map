<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .dark-mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 9999;
        }

        #map {
            width: 100%;
            height: 80vh;
        }

        .form-container {
            margin: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            display: flex;
            gap: 10px;
        }
        
        .dark-mode .form-container {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle">Toggle Dark Mode</button>

    <div class="container-fluid py-3">
        <div class="form-container">
            <input type="text" id="address-input" class="form-control" placeholder="Enter an address">
            <button id="search-address" class="btn btn-primary">Search</button>
        </div>
        <div class="row">
            <div class="col-12">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);

        const lightModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const darkModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        });

        let currentTileLayer = lightModeTiles;
        currentTileLayer.addTo(map);

        document.getElementById('dark-mode-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const darkModeEnabled = document.body.classList.contains('dark-mode');

            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeEnabled ? darkModeTiles : lightModeTiles;
            currentTileLayer.addTo(map);

            localStorage.setItem('darkMode', darkModeEnabled);
        });

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeTiles;
            currentTileLayer.addTo(map);
        }

        document.getElementById('search-address').addEventListener('click', async function() {
            const address = document.getElementById('address-input').value.trim();
            if (!address) {
                alert("Please enter an address.");
                return;
            }
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                
                if (data.length === 0) {
                    alert("Address not found. Please try a different location.");
                    return;
                }
                
                const { lat, lon, display_name } = data[0];
                
                const marker = L.marker([lat, lon]).addTo(map);
                marker.bindPopup(`<b>${display_name}</b>`).openPopup();
                
                map.setView([lat, lon], 12);
            } catch (error) {
                console.error('Error fetching address:', error);
                alert("Error fetching address. Please try again later.");
            }
        });
    </script>
</body>
</html>
