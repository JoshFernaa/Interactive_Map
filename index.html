<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .dark-mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 9999;
        }

        #map {
            width: 100%;
            height: 80vh;
        }

        .form-container {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .dark-mode .form-container {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle">Toggle Dark Mode</button>

    <div class="container-fluid py-3">
        <div class="row">
            <div class="col-12">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);

        const lightModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        const darkModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        });

        let currentTileLayer = lightModeTiles;
        currentTileLayer.addTo(map);

        const markerLayer = L.layerGroup().addTo(map);

        const landmarks = [
            { name: "Great Wall of China", coords: [40.4319, 116.5704] },
            { name: "Petra", coords: [30.3285, 35.4444] },
            { name: "Christ the Redeemer", coords: [-22.9519, -43.2105] },
            { name: "Machu Picchu", coords: [-13.1631, -72.5450] },
            { name: "Chichen Itza", coords: [20.6843, -88.5678] },
            { name: "Roman Colosseum", coords: [41.8902, 12.4922] },
            { name: "Taj Mahal", coords: [27.1751, 78.0421] }
        ];

        landmarks.forEach(landmark => {
            L.marker(landmark.coords)
                .bindPopup(`<b>${landmark.name}</b>`)
                .addTo(markerLayer);
        });

        document.getElementById('dark-mode-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const darkModeEnabled = document.body.classList.contains('dark-mode');

            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeEnabled ? darkModeTiles : lightModeTiles;
            currentTileLayer.addTo(map);

            localStorage.setItem('darkMode', darkModeEnabled);
        });

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeTiles;
            currentTileLayer.addTo(map);
        }

        let customMarkers = {};

        map.on('click', async function(e) {
            if (e.originalEvent.target.tagName !== 'BUTTON' && e.originalEvent.target.tagName !== 'INPUT') {
                const { lat, lng } = e.latlng;

                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                    const data = await response.json();
                    const address = data.display_name || "Custom Location";

                    const marker = L.marker([lat, lng]).addTo(map);
                    customMarkers[marker._leaflet_id] = marker;
                    
                    marker.bindPopup(getPopupContent(marker._leaflet_id, address)).openPopup();
                } catch (error) {
                    console.error('Error fetching address:', error);
                }
            }
        });

        function getPopupContent(markerId, name) {
            return `
                <div>
                    <input type="text" value="${name}" id="marker-name-${markerId}" style="width: 100%; margin-bottom: 5px;">
                    <button onclick="saveMarker(${markerId})" class="btn btn-primary btn-sm">Save</button>
                    <button onclick="deleteMarker(${markerId})" class="btn btn-danger btn-sm">Delete</button>
                </div>
            `;
        }

        function saveMarker(markerId) {
            const input = document.getElementById(`marker-name-${markerId}`);
            if (!input) return;
            
            const newName = input.value;
            if (customMarkers[markerId]) {
                customMarkers[markerId].bindPopup(`<b>${newName}</b>`).closePopup();
            }
        }

        function deleteMarker(markerId) {
            if (customMarkers[markerId]) {
                map.removeLayer(customMarkers[markerId]);
                delete customMarkers[markerId];
            }
        }
    </script>
</body>
</html>
