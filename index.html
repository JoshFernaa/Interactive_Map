<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .dark-mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 9999;
        }

        #search-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #map {
            width: 100%;
            height: 80vh;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle">Toggle Dark Mode</button>
    
    <div id="search-container">
        <input type="text" id="address-input" placeholder="Enter an address or landmark">
        <button onclick="searchAddress()">Search</button>
    </div>

    <div class="container-fluid py-3">
        <div class="row">
            <div class="col-12">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);
        const lightModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        }).addTo(map);
        const darkModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        let currentTileLayer = lightModeTiles;

        const markerLayer = L.layerGroup().addTo(map);
        const landmarks = [
            { name: "Great Wall of China", coords: [40.4319, 116.5704] },
            { name: "Petra", coords: [30.3285, 35.4444] },
            { name: "Christ the Redeemer", coords: [-22.9519, -43.2105] },
            { name: "Machu Picchu", coords: [-13.1631, -72.5450] },
            { name: "Chichen Itza", coords: [20.6843, -88.5678] },
            { name: "Roman Colosseum", coords: [41.8902, 12.4922] },
            { name: "Taj Mahal", coords: [27.1751, 78.0421] }
        ];

        landmarks.forEach(landmark => {
            const marker = L.marker(landmark.coords).addTo(markerLayer);
            marker.bindPopup(`
                <div>
                    <input type="text" value="${landmark.name}" id="marker-name-${marker._leaflet_id}">
                    <button onclick="updateMarkerName(${marker._leaflet_id})">Save</button>
                    <button onclick="deleteMarker(${marker._leaflet_id})">Delete</button>
                </div>
            `);
        });

        function searchAddress() {
            const address = document.getElementById('address-input').value;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        const { lat, lon } = data[0];
                        const marker = L.marker([lat, lon]).addTo(markerLayer);
                        marker.bindPopup(`
                            <div>
                                <input type="text" value="${address}" id="marker-name-${marker._leaflet_id}">
                                <button onclick="updateMarkerName(${marker._leaflet_id})">Save</button>
                                <button onclick="deleteMarker(${marker._leaflet_id})">Delete</button>
                            </div>
                        `).openPopup();
                        map.setView([lat, lon], 10);
                    } else {
                        alert("Address not found. Please try again.");
                    }
                });
        }

        function updateMarkerName(markerId) {
            const input = document.getElementById(`marker-name-${markerId}`);
            if (!input) return;
            map.eachLayer(layer => {
                if (layer instanceof L.Marker && layer._leaflet_id === markerId) {
                    layer.bindPopup(`<b>${input.value}</b>`);
                }
            });
        }

        function deleteMarker(markerId) {
            map.eachLayer(layer => {
                if (layer instanceof L.Marker && layer._leaflet_id === markerId) {
                    map.removeLayer(layer);
                }
            });
        }

        document.getElementById('dark-mode-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            map.removeLayer(currentTileLayer);
            currentTileLayer = document.body.classList.contains('dark-mode') ? darkModeTiles : lightModeTiles;
            currentTileLayer.addTo(map);
        });
    </script>
</body>
</html>
