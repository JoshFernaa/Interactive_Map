<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="interactive-map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="container-fluid py-5">
        <div class="row">
            <div class="col-12">
                <div id="map" style="width: 100%; height: 80vh;"></div>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([20, 0], 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var wonders = [
            { name: "Great Wall of China", coords: [40.4319, 116.5704] },
            { name: "Petra", coords: [30.3285, 35.4444] },
            { name: "Christ the Redeemer", coords: [-22.9519, -43.2105] },
            { name: "Machu Picchu", coords: [-13.1631, -72.5450] },
            { name: "Chichen Itza", coords: [20.6830, -88.5696] },
            { name: "Roman Colosseum", coords: [41.8902, 12.4922] },
            { name: "Taj Mahal", coords: [27.1751, 78.0421] },
            {name: "Great Pyramid of Giza", coords: [29.976480, 31.131302] }
        ];

        wonders.forEach(function(wonder) {
            L.marker(wonder.coords).addTo(map)
                .bindPopup(`<b>${wonder.name}</b>`);
        });
    </script>
</body>
</html>
