<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        /* Dark mode toggle button */
        .dark-mode-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #333;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 9999;
        }


        #map {
            width: 100%;
            height: 80vh;
        }

        /* User input form styling */
        .form-container {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        
        .dark-mode .form-container {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle">Toggle Dark Mode</button>

    <div class="container-fluid py-3">
        <div class="row">
            <div class="col-12">
                <div id="map"></div>
            </div>
        </div>
        
        <!-- User Input Form for Adding Custom Locations -->
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="form-container">
                    <h5>Add a Custom Landmark</h5>
                    <form id="landmark-form">
                        <div class="mb-2">
                            <input type="text" id="landmark-name" class="form-control" placeholder="Landmark Name" required>
                        </div>
                        <div class="mb-2">
                            <input type="text" id="address" class="form-control" placeholder="Enter Address" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Landmark</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([20, 0], 2);

        // Light mode tiles (English labels enforced)
        const lightModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);


        // Dark mode tiles
        const darkModeTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors & CartoDB'
        });

        let currentTileLayer = lightModeTiles;
        currentTileLayer.addTo(map);

        const markerLayer = L.layerGroup().addTo(map);

        // Wonders of the World
        const landmarks = [
            { name: "Great Wall of China", coords: [40.4319, 116.5704] },
            { name: "Petra", coords: [30.3285, 35.4444] },
            { name: "Christ the Redeemer", coords: [-22.9519, -43.2105] },
            { name: "Machu Picchu", coords: [-13.1631, -72.5450] },
            { name: "Chichen Itza", coords: [20.6843, -88.5678] },
            { name: "Roman Colosseum", coords: [41.8902, 12.4922] },
            { name: "Taj Mahal", coords: [27.1751, 78.0421] }
        ];

        // Add predefined landmark markers
        landmarks.forEach(landmark => {
            L.marker(landmark.coords)
                .bindPopup(`<b>${landmark.name}</b>`)
                .addTo(markerLayer);
        });

        // Dark Mode Toggle
        document.getElementById('dark-mode-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const darkModeEnabled = document.body.classList.contains('dark-mode');

            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeEnabled ? darkModeTiles : lightModeTiles;
            currentTileLayer.addTo(map);

            localStorage.setItem('darkMode', darkModeEnabled);
        });

        // Load dark mode setting on page load
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            map.removeLayer(currentTileLayer);
            currentTileLayer = darkModeTiles;
            currentTileLayer.addTo(map);
        }

        // Handle user input for adding custom landmarks
        document.getElementById('landmark-form').addEventListener('submit', function(event) {
            event.preventDefault();

            let name = document.getElementById('landmark-name').value.trim();
            let address = document.getElementById('address').value.trim();

            if (!name || !address) {
                alert("Please enter a valid landmark name and address.");
                return;
            }

            // Use OpenStreetMap Nominatim API for geocoding
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        alert("Address not found. Please try another.");
                        return;
                    }

                    let lat = parseFloat(data[0].lat);
                    let lng = parseFloat(data[0].lon);

                    // Add marker for custom input
                    L.marker([lat, lng])
                        .bindPopup(`<b>${name}</b><br>${address}`)
                        .addTo(markerLayer);

                    // Reset form fields
                    document.getElementById('landmark-name').value = "";
                    document.getElementById('address').value = "";
                })
                .catch(error => {
                    console.error("Error fetching location:", error);
                    alert("Error fetching location. Please try again.");
                });
        });

        // Allow users to click on the map to add a marker
        map.on('click', function(event) {
            let lat = event.latlng.lat;
            let lng = event.latlng.lng;
            let customMarker = L.marker([lat, lng])
                .bindPopup(`<b>Custom Marker</b><br>Lat: ${lat.toFixed(5)}, Lng: ${lng.toFixed(5)}`)
                .addTo(markerLayer);

            customMarker.openPopup();
        });
    </script>
</body>
</html>
