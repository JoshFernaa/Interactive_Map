<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="interactive-map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="container-fluid py-5">
        <div class="row">
            <div class="col-12">
                <div id="map" style="width: 100%; height: 80vh;"></div>
                <div id="location-popup" class="popup d-none">
                    <h3 id="popup-title"></h3>
                    <p id="popup-content"></p>
                    <button id="popup-close" class="btn btn-danger">Close</button>
                </div>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-6">
                <input type="text" id="location-input" class="form-control" placeholder="Enter location (address or coordinates)">
            </div>
            <div class="col-md-6">
                <button id="add-location" class="btn btn-primary">Add Location</button>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([40.7128, -74.0060], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var landmarks = [
            { name: "Statue of Liberty", coords: [40.6892, -74.0445] },
            { name: "Eiffel Tower", coords: [48.8584, 2.2945] },
            { name: "Colosseum", coords: [41.8902, 12.4922] }
        ];

        landmarks.forEach(landmark => {
            L.marker(landmark.coords).addTo(map)
                .bindPopup(`<b>${landmark.name}</b>`);
        });

        document.getElementById('add-location').addEventListener('click', function () {
            var input = document.getElementById('location-input').value;
            if (input) {
                var parts = input.split(',');
                if (parts.length === 2) {
                    var lat = parseFloat(parts[0].trim());
                    var lng = parseFloat(parts[1].trim());
                    if (!isNaN(lat) && !isNaN(lng)) {
                        L.marker([lat, lng]).addTo(map)
                            .bindPopup("Custom Location").openPopup();
                        return;
                    }
                }
                alert("Please enter valid coordinates (lat, lng)");
            }
        });

        map.on('click', function (e) {
            L.marker([e.latlng.lat, e.latlng.lng]).addTo(map)
                .bindPopup("Custom Location").openPopup();
        });
    </script>
</body>
</html>
